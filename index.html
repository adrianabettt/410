<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secretaria Escolar Virtual</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Nunito+Sans:wght@400;600&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --azul:        #2563EB;
  --azul-claro: #DBEAFE;
  --azul-txt:    #1E3A8A;
  --verde:       #16A34A;
  --verde-cl:    #DCFCE7;
  --verde-txt:   #14532D;
  --amarelo:     #D97706;
  --amarelo-cl: #FEF3C7;
  --amarelo-txt:#78350F;
  --vermelho:    #DC2626;
  --vermelho-cl:#FEE2E2;
  --vermelho-txt:#7F1D1D;
  --cinza-bg:    #F8FAFC;
  --cinza-card: #FFFFFF;
  --cinza-borda:#E2E8F0;
  --cinza-txt:   #475569;
  --txt-main:    #1E293B;
  --radius:      12px;
}

body {
  font-family: 'Nunito Sans', sans-serif;
  background: var(--cinza-bg);
  color: var(--txt-main);
  min-height: 100vh;
  font-size: 15px;
  overflow: hidden; /* Mantendo sua preferência de tela única */
}

/* ── TOPO ── */
.topo {
  background: var(--azul);
  color: #fff;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.topo-info h1 { font-family: 'Nunito', sans-serif; font-size: 18px; font-weight: 800; }
.topo-placar { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.barra-prog { width: 120px; height: 10px; background: rgba(255,255,255,0.25); border-radius: 5px; overflow: hidden; }
.barra-fill { height: 100%; background: #86EFAC; transition: width 0.5s ease; }

/* ── LAYOUT ── */
.main {
  display: grid;
  grid-template-columns: 320px 1fr;
  gap: 16px;
  padding: 16px;
  height: calc(100vh - 120px);
}

/* ── PAINEL DE MISSÃO ── */
.painel {
  background: var(--cinza-card);
  border: 2px solid var(--cinza-borda);
  border-radius: var(--radius);
  padding: 16px;
  display: flex;
  flex-direction: column;
}
.cmd-card { padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 5px solid var(--azul); }
.cmd-texto { font-weight: 700; font-size: 14px; margin: 10px 0; line-height: 1.4; }
.btn-acao {
  width: 100%;
  padding: 12px;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-weight: 800;
  font-family: 'Nunito', sans-serif;
  cursor: pointer;
  font-size: 14px;
  transition: 0.2s;
}

/* ── GRADE E FICHAS ── */
.grade-fichas { 
  display: grid; 
  grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); 
  gap: 12px; 
  overflow-y: auto; 
  padding-bottom: 40px; 
}
.ficha { background: #fff; border: 2px solid var(--cinza-borda); border-radius: var(--radius); padding: 12px; transition: 0.3s; }
.ficha.destaque { border-color: var(--azul); box-shadow: 0 0 0 3px var(--azul-claro); }

.campo-bloco { margin-bottom: 8px; }
.campo-topo { display: flex; justify-content: space-between; margin-bottom: 2px; }
.campo-rotulo { font-size: 10px; font-weight: 700; color: var(--cinza-txt); text-transform: uppercase; }
.btn-remover { font-size: 9px; padding: 1px 5px; border-radius: 4px; border: 1px solid var(--vermelho); background: var(--vermelho-cl); color: var(--vermelho-txt); cursor: pointer; font-weight: 800; }

.campo-input { width: 100%; font-size: 12px; padding: 6px; border: 1.5px solid var(--cinza-borda); border-radius: 6px; font-family: inherit; }

.add-bloco { display: flex; gap: 4px; margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--cinza-borda); }
.add-bloco input { flex: 1; font-size: 11px; padding: 5px; border: 1px solid var(--cinza-borda); border-radius: 4px; }
.btn-add { background: var(--verde-cl); color: var(--verde-txt); border: 1px solid var(--verde); border-radius: 4px; padding: 0 8px; cursor: pointer; font-weight: 800; }

/* ── MODAL FINAL ── */
#modal-fim {
  display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: #fff; padding: 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  z-index: 100; text-align: center; width: 300px;
}

.rodape { position: fixed; bottom: 0; width: 100%; background: #fff; padding: 8px; text-align: center; font-size: 11px; border-top: 1px solid var(--cinza-borda); }
</style>
</head>
<body>

<div class="topo">
  <div class="topo-info">
    <h1>Secretaria Escolar Virtual</h1>
   
  </div>
  <div class="topo-placar">
    <div class="barra-prog"><div class="barra-fill" id="barra-fill" style="width:0%"></div></div>
    <span id="placar-txt" style="font-weight:800; font-size:14px;">0 / 12</span>
  </div>
</div>

<div class="main">
  <div class="painel">
    <div class="cmd-card" id="cmd-card">
        <div id="cmd-num" style="font-size: 11px; font-weight: 700; color: var(--cinza-txt);">Missão 1</div>
        <div id="cmd-texto" class="cmd-texto">Carregando missão...</div>
        <button class="btn-acao" id="btn-principal" onclick="verificarAcao()">✓ Confirmei!</button>
    </div>
    <div id="historico" style="font-size:11px; color:var(--cinza-txt); overflow-y:auto;"></div>
  </div>

  <div class="grade-fichas" id="grade"></div>
</div>

<div id="modal-fim">
    <h2 style="color:var(--azul)">Parabéns!</h2>
    <p style="margin:10px 0">Todos os registros foram organizados.</p>
    <div style="background:var(--azul-claro); padding:10px; border-radius:10px; font-weight:800; font-size:24px; color:var(--azul)">NOTA 10</div>
    <button onclick="location.reload()" class="btn-acao" style="background:var(--azul); margin-top:15px">Recomeçar</button>
</div>

<div class="rodape">
  Material Pedagógico - <strong>Profª Adriana Bett Terebinto</strong> © 2026
</div>

<script>
var alunos = [
  { id: 'a1', nome: 'Ana Lima',    turma: '4ºA', idade: '9',  telefone: '(44) 98801-1122', endereco: 'Rua das Palmeiras, 10' },
  { id: 'a2', nome: 'Bruno Reis',  turma: '4ºB', idade: '10', telefone: '(44) 98802-3344', endereco: 'Av. Brasil, 205' },
  { id: 'a3', nome: 'Carla Souza', turma: '4ºA', idade: '9',  telefone: '(44) 98803-5566', endereco: 'Rua das Flores, 30' }
];

var MISSOES = [
  { tipo: 'consultar', alvo: 'a3', texto: 'Localize o telefone da Carla Souza.' },
  { tipo: 'alterar', alvo: 'a2', campo: 'endereco', valor: 'Rua Nova, 100', texto: 'Altere o endereço do Bruno Reis para: Rua Nova, 100' },
  { tipo: 'adicionar', alvo: 'a1', campo: 'email', texto: 'Crie o campo "Email" na ficha da Ana Lima.' },
  { tipo: 'alterar', alvo: 'a1', campo: 'email', valor: 'ana@escola.br', texto: 'Preencha o e-mail da Ana com: ana@escola.br' },
  { tipo: 'remover', alvo: 'a2', campo: 'idade', texto: 'Remova o campo "Idade" do Bruno Reis.' }
];

var etapa = 0;

function render() {
    const grade = document.getElementById('grade');
    grade.innerHTML = '';
    const m = MISSOES[etapa];

    alunos.forEach(aluno => {
        const isAlvo = m && m.alvo === aluno.id;
        let camposHtml = '';
        
        for (let chave in aluno) {
            if (chave === 'id' || chave === 'nome') continue;
            camposHtml += `
                <div class="campo-bloco">
                    <div class="campo-topo">
                        <span class="campo-rotulo">${chave}</span>
                        <button class="btn-remover" onclick="removerCampo('${aluno.id}','${chave}')">Remover</button>
                    </div>
                    <input type="text" class="campo-input" id="inp-${aluno.id}-${chave}" value="${aluno[chave]}" onchange="sync('${aluno.id}','${chave}', this.value)">
                </div>`;
        }

        grade.innerHTML += `
            <div class="ficha ${isAlvo ? 'destaque' : ''}">
                <div style="font-weight:800; margin-bottom:10px; border-bottom:1px solid #eee; padding-bottom:5px;">${aluno.nome}</div>
                ${camposHtml}
                <div class="add-bloco">
                    <input type="text" id="add-${aluno.id}" placeholder="Nome do campo...">
                    <button class="btn-add" onclick="criarCampo('${aluno.id}')">+</button>
                </div>
            </div>`;
    });
    atualizarPainel();
}

function sync(id, campo, valor) {
    const aluno = alunos.find(a => a.id === id);
    if(aluno) aluno[campo] = valor.trim();
}

function criarCampo(id) {
    const input = document.getElementById(`add-${id}`);
    const nomeCampo = input.value.toLowerCase().trim();
    if(!nomeCampo) return;
    const aluno = alunos.find(a => a.id === id);
    if(!aluno[nomeCampo]) {
        aluno[nomeCampo] = "";
        render();
    }
}

function removerCampo(id, campo) {
    const aluno = alunos.find(a => a.id === id);
    delete aluno[campo];
    render();
}

function atualizarPainel() {
    if (etapa >= MISSOES.length) {
        document.getElementById('modal-fim').style.display = 'block';
        return;
    }
    const m = MISSOES[etapa];
    const btn = document.getElementById('btn-principal');
    const card = document.getElementById('cmd-card');
    
    document.getElementById('cmd-num').innerText = `Missão ${etapa + 1} de ${MISSOES.length}`;
    document.getElementById('cmd-texto').innerText = m.texto;
    document.getElementById('placar-txt').innerText = `${etapa} / ${MISSOES.length}`;
    document.getElementById('barra-fill').style.width = `${(etapa/MISSOES.length)*100}%`;

    // Lógica de texto e cor do botão conforme sua solicitação
    if (m.tipo === 'alterar') {
        btn.innerText = "✎ Alterei!";
        btn.style.background = "var(--amarelo)";
        card.style.borderLeftColor = "var(--amarelo)";
    } else if (m.tipo === 'consultar') {
        btn.innerText = "✓ Confirmei!";
        btn.style.background = "var(--azul)";
        card.style.borderLeftColor = "var(--azul)";
    } else if (m.tipo === 'adicionar') {
        btn.innerText = "➕ Adicionei!";
        btn.style.background = "var(--verde)";
        card.style.borderLeftColor = "var(--verde)";
    } else if (m.tipo === 'remover') {
        btn.innerText = "🗑️ Removi!";
        btn.style.background = "var(--vermelho)";
        card.style.borderLeftColor = "var(--vermelho)";
    }
}

function verificarAcao() {
    const m = MISSOES[etapa];
    const aluno = alunos.find(a => a.id === m.alvo);
    let sucesso = false;

    if (m.tipo === 'consultar') sucesso = true;
    if (m.tipo === 'alterar') sucesso = (aluno[m.campo] && aluno[m.campo].toLowerCase() === m.valor.toLowerCase());
    if (m.tipo === 'adicionar') sucesso = (aluno[m.campo] !== undefined);
    if (m.tipo === 'remover') sucesso = (aluno[m.campo] === undefined);

    if (sucesso) {
        etapa++;
        render();
    } else {
        alert("Ops! Verifique se você realizou a ação corretamente na ficha destacada.");
    }
}

render();
</script>
</body>
</html>
